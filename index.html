<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Every Cinema London — London cinema showtimes, powered by Clusterflick</title>
    <meta
      name="description"
      content="Showtimes from every cinema in London in one place — browse and filter by genre, format and accessibility. A fast, grid-powered view of Clusterflick's cinema data."
    />
    <meta property="og:title" content="Every Cinema London — London cinema showtimes" />
    <meta
      property="og:description"
      content="Every London cinema showtime in one grid — filter by genre, format and accessibility. Powered by Clusterflick."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Every Cinema London" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
      body { display: flex; flex-direction: column; background: #18181b; color: #e4e4e7; }
      header {
        padding: 10px 16px;
        border-bottom: 1px solid #2e2e34;
        display: flex;
        align-items: center;
        gap: 8px 40px;
        flex-wrap: wrap;
      }
      .brand { display: flex; flex-direction: column; gap: 2px; }
      header h1 { font-size: 16px; margin: 0; line-height: 1.1; }
      .tagline { font-size: 12px; color: #a1a1aa; margin-top: 8px; }
      .tagline a { color: #93b4f5; text-decoration: none; font-weight: 600; }
      .tagline a:hover { text-decoration: underline; }
      header .meta { font-size: 13px; opacity: 0.6; }
      .views { display: flex; gap: 6px; margin-left: auto; }
      .views button {
        font: inherit; font-size: 13px; padding: 4px 12px;
        border: 1px solid #3f3f46; border-radius: 6px; background: transparent;
        cursor: pointer; color: inherit;
      }
      .views button.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
      #grid { flex: 1; min-height: 0; }
      .poster { height: 34px; border-radius: 3px; vertical-align: middle; }
      .book { font-size: 12px; text-decoration: none; padding: 2px 8px;
        border: 1px solid #8886; border-radius: 5px; }
      footer {
        padding: 8px 16px;
        border-top: 1px solid #2e2e34;
        font-size: 12px;
        color: #a1a1aa;
        display: flex;
        gap: 8px 20px;
        flex-wrap: wrap;
        align-items: center;
      }
      footer a { color: #93b4f5; text-decoration: none; }
      footer a:hover { text-decoration: underline; }
      footer .sep { opacity: 0.35; }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <h1>🎬 Every Cinema London</h1>
        <span class="tagline">
          London showtimes, all in one place · powered by
          <a href="https://clusterflick.com" target="_blank" rel="noopener">Clusterflick →</a>
        </span>
      </div>
      <span class="meta" id="meta">loading…</span>
      <div class="views">
        <button data-view="grouped" class="active">Grouped (movie ▸ venue)</button>
        <button data-view="pivot">Pivot (venue × date)</button>
        <button data-view="flat">Flat table</button>
      </div>
    </header>
    <div id="grid"></div>
    <footer>
      <span>
        <a href="/attributions.html#clusterflick">Performance data</a> from
        <a href="https://clusterflick.com" target="_blank" rel="noopener">Clusterflick</a>
      </span>
      <span class="sep">·</span>
      <span>
        <a href="/attributions.html#tmdb">Film metadata</a> from
        <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a>
      </span>
      <span class="sep">·</span>
      <span>
        Grid library by
        <a href="https://www.ag-grid.com" target="_blank" rel="noopener">AG Grid</a>
      </span>
      <span class="sep">·</span>
      <span>
        <a href="https://github.com/alistairjcbrown/everycinema.london" target="_blank" rel="noopener">Source on GitHub</a>
      </span>
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
